<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin - Create Jobs</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Create Job</h1>

<button onclick="logout()">Logout</button>  
  
<div class="form">

  <input id="jobNumber" placeholder="Job Number (e.g. G001)">
  <input id="customer" placeholder="Customer Name">
  <input id="address" placeholder="Address (for sat nav)">
  <select id="jobType">
    <option value="Garage">Garage</option>
    <option value="Office">Office</option>
    <option value="Ground Screw Base">Ground Screw Base</option>
  </select>

  <label>Assigned To</label>

<select id="assignedTo">
  <option value="">Loading staff...</option>
</select>

  <input id="formUrl" placeholder="Tally Form URL">

  <button onclick="createJob()">Create Job</button>

</div>

<p id="status"></p>

<h2>Existing Jobs</h2>
<div id="jobList"></div>

<script type="module" src="admin.js"></script>

</body>
</html>
