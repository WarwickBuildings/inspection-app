<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1">

  <title>Inspection</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <h1>Inspection</h1>

  <label>
    <input type="checkbox" id="baseLevel">

  <button onclick="saveInspection()">

  <script type="module" src="inspection.js"></script>

</body>

</html>
